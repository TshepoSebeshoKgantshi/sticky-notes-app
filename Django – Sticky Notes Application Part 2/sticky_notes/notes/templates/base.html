{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Sticky Notes
        {% endblock title %}
    </title>
    <link rel="stylesheet" href="{% static 'notes/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <h1>
            {% block header %}
                Sticky Notes
            {% endblock header %}
        </h1>
        <nav>
            <a href="{% url 'note_list' %}">All Notes</a>
            <a href="{% url 'note_create' %}">Create Note</a>
        </nav>
    </header>
    <main class="page-content">
        {% block content %}
        {% endblock content %}
    </main>
</body>
</html>
